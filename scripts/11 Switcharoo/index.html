<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css"> </head>
<body>

	<div class="scale-wrapper">
		<div id="gridContainer" class="grid-container"></div>
		
		<div class="info-header" id="infoHeader">
			<div id="tournamentTitle" class="header-text text-left"></div>
			<div id="categoryLegend" class="group-legend-container"></div>
			<div id="tournamentFormat" class="header-text text-right"></div>
		</div>

		<div class="bottom-bar-container">
			
			<div class="info-box" id="prizePoolBox">
				<div class="title">PRIZE POOL</div>
				<div class="value">$0</div>
			</div>

			<div class="info-box" id="respinPoolBox">
				<div class="title">RESPIN POOL</div>
				<div class="value">$0 / $0</div>
			</div>

			<div class="info-box timer-box" id="timerBox">
				<div class="title">TIME LEFT</div>
				<div class="value">5:00</div>
			</div>

		</div>
	</div>


<script src="script.js"></script> </body>
</html>
